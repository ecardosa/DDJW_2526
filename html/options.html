<!DOCTYPE html> 
<html>
	<head>
        <script src="../js/options.js" type="module"></script>
		<title> Memory - Opcions </title>
		<link rel="stylesheet" href="../styles/style.css">
	</head>
	<body>
		<h1>Opcions</h1>
        <label for="pairs">Número de cartes</label>
        <input type="number" id="pairs" value="2" min="2" max="6">
        <label for="groupSize">Mida de les parelles</label>
        <select id="groupSize">
            <option value="2" selected>Parelles</option>
            <option value="3" >Trios</option>
            <option value="4">Quartets</option>
        </select>
        <label for="dif">Dificultat</label>
        <select id="dif">
            <option value="easy">Baixa</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Alta</option>
        </select>
        <h2>Mode de joc</h2>
        <label for="difficulty">Nivell inicial mode 2</label>
        <input type="number" id="difficulty" value="1" min="1" max="10">
        <div class="buttons_container">
        <button id="default">Per defecte</button>
        <button id="apply">Aplicar</button>
        <button id="back">Tornar al menú</button>
        </div>
	</body>
</html>
